version: "3.1"

intents:
  - greet
  - goodbye
  - ask_bus_schedule
  - track_by_number
  - ask_pricing
  - ask_support

responses:
  utter_greet:
    - text: "Hello! I am NOVU. How can I help you?"
  
  utter_goodbye:
    - text: "Goodbye! Have a nice day!"
  
  utter_ask_bus_schedule:
    - text: "Let me check the bus schedule for you."
  
  utter_track_by_number:
    - text: "Your parcel is in transit."
  
  utter_pricing_calculator:
    - text: "Bus fares: Rs.1500-4500"
  
  utter_support_info:
    - text: "Contact support: +92-300-1234567"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
